<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT VIP 对话 - VIP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #10a37f 0%, #1a7f5a 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    h1 { color: #10a37f; margin-bottom: 15px; text-align: center; }
    .vip-badge { display: none; background: linear-gradient(90deg, #ffd700, #ffaa00); color: #000; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-bottom: 15px; text-align: center; }
    .vip-badge.show { display: block; }
    .login-section { background: #f5f5f5; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
    .login-section h3 { margin-bottom: 15px; color: #333; }
    .login-section input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
    .login-section button { width: 100%; padding: 12px; background: #10a37f; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; }
    .pay-section { background: #fff3cd; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center; }
    .pay-section h3 { color: #856404; margin-bottom: 10px; }
    .pay-section img { width: 140px; height: 140px; border-radius: 8px; }
    .chat-box { height: 350px; border: 1px solid #ddd; border-radius: 10px; overflow-y: auto; padding: 15px; margin-bottom: 15px; background: #f9f9f9; display: none; }
    .message { margin-bottom: 15px; padding: 12px; border-radius: 10px; max-width: 80%; }
    .user-msg { background: #10a37f; color: white; margin-left: auto; }
    .ai-msg { background: #f0f0f0; color: #333; }
    .input-area { display: none; gap: 10px; }
    .input-area.show { display: flex; }
    .input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .input-area button { padding: 12px 20px; background: #10a37f; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .code-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 10px; text-align: center; }
    .price { font-size: 24px; color: #e74c3c; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 ChatGPT VIP 对话</h1>
    
    <div class="vip-badge" id="vipBadge">👑 VIP会员 - 剩余 <span id="remainCount">50</span> 次</div>
    
    <div class="login-section" id="loginSection">
      <h3>👑 开通会员</h3>
      <p style="font-size:13px;color:#666;margin-bottom:15px;">✅ 每次对话消耗次数<br>✅ 付费后联系客服开通</p>
      
      <div class="pay-section">
        <h3>💰 <span class="price">¥19.9</span>/100次</h3>
        <img src="https://raw.githubusercontent.com/renfei15238568276-ship-it/pdf2img-images/main/wechat.jpg" alt="微信支付">
        <p style="font-size:12px;color:#666;margin-top:10px;">付款后截图发给微信: r18974670134</p>
      </div>
      
      <p style="font-size:13px;color:#666;margin:15px 0;">或输入兑换码开通：</p>
      <input type="text" id="vipCode" class="code-input" placeholder="客服给的兑换码">
      <button onclick="redeemCode()">立即开通</button>
    </div>
    
    <div class="chat-box" id="chatBox"></div>
    
    <div class="input-area" id="inputArea">
      <input type="text" id="userInput" placeholder="请输入您的问题..." onkeypress="if(event.key==='Enter')sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <script>
    const API_KEY = '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';
    
    let isVip = localStorage.getItem('isVip') === 'true';
    let count = parseInt(localStorage.getItem('chatCount') || '0');
    
    if (isVip) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('vipBadge').classList.add('show');
      document.getElementById('chatBox').style.display = 'block';
      document.getElementById('inputArea').classList.add('show');
      document.getElementById('remainCount').textContent = count;
      addMessage('你好！我是AI助手，有什么可以帮你的？', 'ai');
    }
    
    function redeemCode() {
      const code = document.getElementById('vipCode').value.trim().toLowerCase();
      if (code === 'gptvip') {
        isVip = true;
        count = 100;
        localStorage.setItem('isVip', 'true');
        localStorage.setItem('chatCount', count);
        
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('vipBadge').classList.add('show');
        document.getElementById('chatBox').style.display = 'block';
        document.getElementById('inputArea').classList.add('show');
        document.getElementById('remainCount').textContent = count;
        
        addMessage('🎉 VIP开通成功！您有100次对话次数', 'ai');
      } else {
        alert('兑换码无效，请联系客服购买');
      }
    }
    
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      if (!message) return;
      
      if (count <= 0) {
        alert('次数用完了，请联系客服续费');
        return;
      }
      
      addMessage(message, 'user');
      input.value = '';
      
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      sendBtn.textContent = '思考中...';
      
      try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + API_KEY
          },
          body: JSON.stringify({
            model: 'gpt-3.5-turbo',
            messages: [{role: 'user', content: message}]
          })
        });
        
        const data = await response.json();
        
        if (data.choices && data.choices[0]) {
          const reply = data.choices[0].message.content;
          addMessage(reply, 'ai');
          count--;
          localStorage.setItem('chatCount', count);
          document.getElementById('remainCount').textContent = count;
        } else {
          addMessage('❌ 错误: ' + (data.error?.message || '未知错误'), 'ai');
        }
      } catch (e) {
        addMessage('❌ 网络错误: ' + e.message, 'ai');
      }
      
      sendBtn.disabled = false;
      sendBtn.textContent = '发送';
    }
    
    function addMessage(text, type) {
      const box = document.getElementById('chatBox');
      const div = document.createElement('div');
      div.className = 'message ' + (type === 'user' ? 'user-msg' : 'ai-msg');
      div.textContent = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }
  </script>
</body>
</html>
